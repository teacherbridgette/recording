<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Wynn's English Recording Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-green: #7a9e60;
            --sun-orange: #e2a87a;
            --deep-brown: #665040;
            --paper-white: rgba(252, 251, 242, 0.96);
            --primary: var(--bg-green);
            --secondary: var(--sun-orange);
            --accent: #a48c7e;
            --neon-blue: #49b6ff; 
        }

        body { 
            font-family: 'Fredoka', sans-serif; 
            background: url('bg.png') no-repeat center center fixed; 
            background-size: cover; margin: 0; display: flex; 
            flex-direction: column; align-items: center; min-height: 100vh;
            color: var(--deep-brown);
        }

        .widget-bar { position: fixed; top: 15px; right: 15px; display: flex; gap: 12px; z-index: 1000; }
        .widget-btn {
            background: white; border: 3px solid var(--primary); border-radius: 50%;
            width: 50px; height: 50px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 1.3rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s;
            text-decoration: none; color: inherit;
        }
        .widget-btn:hover { box-shadow: 0 0 15px var(--neon-blue); transform: scale(1.1); }

        .studio-title { 
            font-size: 3.2rem; color: white; text-shadow: 4px 4px 0 var(--deep-brown); 
            text-align: center; margin-top: 50px; font-variant: small-caps;
        }

        .screen { display: none; width: 95%; max-width: 900px; padding: 20px; box-sizing: border-box; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .card { 
            background: var(--paper-white); border-radius: 45px; padding: 35px; 
            border: 5px solid var(--accent); box-shadow: 0 20px 45px rgba(0,0,0,0.1);
            margin-top: 20px; backdrop-filter: blur(8px);
        }

        .btn { 
            padding: 20px 30px; border: 3px solid transparent; border-radius: 25px; font-size: 1.3rem; 
            font-weight: 600; cursor: pointer; background: var(--primary); color: white; 
            box-shadow: 0 8px 0 #5a7a48; margin: 12px 0; width: 100%; font-variant: small-caps; 
            transition: all 0.2s ease;
        }
        .btn:hover { border-color: #fff; box-shadow: 0 0 20px var(--neon-blue); transform: scale(1.02); }

        .config-section { background: rgba(255, 255, 255, 0.6); border-radius: 20px; padding: 20px; margin: 15px 0; border: 2px dashed var(--accent); }
        .config-row { display: grid; grid-template-columns: 2fr 1.5fr 100px; gap: 15px; align-items: center; margin-bottom: 12px; }
        .input-box { padding: 12px; border-radius: 12px; border: 2px solid #ccc; width: 100%; font-family: inherit; font-size: 1rem; box-sizing: border-box; }

        .seat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; margin-top: 25px; }
        .seat { 
            background: white; border-radius: 20px; padding: 25px 10px; 
            text-align: center; border: 4px solid #eee; cursor: pointer; 
            font-weight: bold; font-size: 1.2rem; transition: 0.3s;
        }
        .seat:hover { box-shadow: 0 0 15px var(--neon-blue); border-color: var(--neon-blue); transform: translateY(-5px); }
        .seat.done { background: #8fb376; color: white; border-color: #8fb376; }

        #word-display { 
            font-family: 'Comic Sans MS', 'Comic Sans', cursive; 
            font-size: 4.5rem; color: var(--secondary); text-align: center; 
            margin: 35px 0; font-weight: 600; text-shadow: 2px 2px 0 white;
        }

        #rating-display { font-size: 3rem; font-weight: 600; color: var(--deep-brown); margin: 10px 0; }

        footer {
            margin-top: auto; padding: 20px; text-align: center; width: 100%;
            background: var(--paper-white); border-top: 3px solid var(--primary);
            font-weight: 600; font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="widget-bar">
        <button class="widget-btn" onclick="toggleFS()" title="Fullscreen">📺</button>
        <button class="widget-btn" onclick="clearCache()" title="Clear Session">🧹</button>
    </div>

    <audio id="snd-hover" src="hover.mp3" preload="auto"></audio>
    <audio id="snd-click" src="click.mp3" preload="auto"></audio>

    <div id="view-start" class="screen active">
        <h1 class="studio-title">Teacher Wynn's Recording Studio</h1>
        <div class="card">
            <button class="btn" onclick="navGrades('Elementary')">Elementary School</button>
            <button class="btn" style="background:var(--secondary); box-shadow:0 8px 0 #b88661;" onclick="navGrades('Junior High')">Junior High School</button>
        </div>
    </div>

    <div id="view-grades" class="screen">
        <h2 style="text-align:center;">Select Grade</h2>
        <div id="grade-btns" class="card" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px;"></div>
        <button class="btn" style="background:#888; box-shadow:0 8px 0 #555" onclick="showView('view-start')">Back</button>
    </div>

    <div id="view-config" class="screen">
        <div class="card">
            <h2 style="color: var(--primary)">Studio Setup</h2>
            
            <div class="config-section" style="border: 2px solid var(--neon-blue); background: #f0f9ff;">
                <h3 style="color:var(--neon-blue); margin-top:0;">☁️ Cloud Connection</h3>
                <p style="font-size:0.85rem; margin-bottom:8px;">Paste your Google Apps Script URL here:</p>
                <input type="text" id="user-script-url" class="input-box" placeholder="https://script.google.com/macros/s/...">
            </div>

            <div class="config-section">
                <h3>Classes</h3>
                <input type="number" id="num-classes" class="input-box" value="3" onchange="buildClassInputs()">
                <div id="class-entry-area" style="margin-top:10px;"></div>
            </div>

            <div class="config-section">
                <h3>Materials</h3>
                <div class="config-row">
                    <div><strong>Words:</strong><br><input type="file" id="up-words"></div>
                    <select id="mode-words" class="input-box" onchange="toggleQty('mode-words', 'qty-words')"><option value="rnd">Random</option><option value="all">All</option></select>
                    <input type="number" id="qty-words" class="input-box" placeholder="Qty">
                </div>
                </div>
            <button class="btn" style="background:#8fb376; box-shadow:0 8px 0 #6d8a57;" onclick="startSession()">Open Studio 🚀</button>
        </div>
    </div>

    <footer>
        Teacher Wynn is a Filipina English teacher working under the TFETP.
    </footer>

<script>
    const hSnd = document.getElementById('snd-hover');
    const cSnd = document.getElementById('snd-click');
    let studio = { grade: '', pool: [], classNames: {}, settings: {}, activeUrl: "" };
    let isRec = false, mediaRec, chunks = [], recognition, latestScore = 0, activeStudentName = "", currentPromptIndex = 0, currentStudentPrompts = [], sessionScores = [], sessionAudioChunks = [];

    // All logic stays identical, but we now pull the SCRIPT_URL from the input box
    async function startSession() {
        // Save the URL from the input box
        studio.activeUrl = document.getElementById('user-script-url').value.trim();
        
        if(!studio.activeUrl) {
            alert("Please paste your Google Drive Script URL first!");
            return;
        }

        studio.pool = []; studio.classNames = {};
        // ... rest of loading logic ...
        await loadSet('up-words');
        // (Assume other loads here)
        
        const num = document.getElementById('num-classes').value;
        const nav = document.getElementById('class-nav'); nav.innerHTML = '';
        for(let i=1; i<=num; i++) {
            const cid = `${studio.grade}0${i}`;
            nav.innerHTML += `<option value="${cid}">Class ${cid}</option>`;
            const f = document.getElementById('names-'+cid).files[0];
            if(f) {
                const text = await f.text();
                studio.classNames[cid] = text.split('\n').map(n => n.trim()).filter(n => n);
            }
        }
        renderGrid(); showView('view-grid');
    }

    // Logic for uploading now uses studio.activeUrl
    async function uploadFinalSession() {
        document.getElementById('status-msg').innerText = "Uploading to Drive...";
        const blob = new Blob(sessionAudioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const cid = document.getElementById('class-nav').value;
            const safeName = activeStudentName.replace(/[^a-z0-9]/gi, '_') || "Student";
            const scoreString = sessionScores.join('-');
            const fname = `${window.activeS.toString().padStart(2, '0')}_${safeName}_${scoreString}.webm`;
            
            const params = new URLSearchParams({
                audio: base64, 
                filename: fname,
                className: cid
            });

            try {
                // Use the URL provided by the user in the Setup screen
                await fetch(studio.activeUrl, { method: 'POST', body: params, mode: 'no-cors' });
                document.getElementById('seat-'+window.activeS).classList.add('done');
                showView('view-grid');
            } catch (e) {
                alert("Upload failed. Check your Script URL!");
            }
        };
    }

    // ... (rest of the standard functions: showView, toggleMic, etc. from previous versions) ...
    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        setTimeout(attachListeners, 100);
    }
    function attachListeners() {
        document.querySelectorAll('.btn, .seat, .widget-btn').forEach(el => {
            el.onmouseenter = () => { hSnd.currentTime = 0; hSnd.play(); };
            el.onmousedown = () => { cSnd.currentTime = 0; cSnd.play(); };
        });
    }
    function navGrades(type) {
        const container = document.getElementById('grade-btns'); container.innerHTML = '';
        const grades = type === 'Elementary' ? [1,2,3,4,5,6] : [7,8,9];
        grades.forEach(g => {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = 'Grade ' + g;
            b.onclick = () => { studio.grade = g; buildConfig(); };
            container.appendChild(b);
        });
        showView('view-grades');
    }
    function buildConfig() { buildClassInputs(); showView('view-config'); }
    function buildClassInputs() {
        const num = document.getElementById('num-classes').value;
        const area = document.getElementById('class-entry-area'); area.innerHTML = '';
        for(let i=1; i<=num; i++) {
            const cid = `${studio.grade}0${i}`;
            area.innerHTML += `<div style="background:white; padding:10px; margin-bottom:8px; border-radius:12px; border:1px solid #ddd;">
                <strong>Class ${cid}</strong><br>
                <input type="file" id="names-${cid}" class="input-box" style="margin-top:5px;" accept=".txt">
            </div>`;
        }
    }
    async function loadSet(fId) {
        const f = document.getElementById(fId).files[0];
        if(!f) return;
        let lines = (await f.text()).split('\n').map(l => l.trim()).filter(l => l);
        studio.pool.push(...lines);
    }
    function renderGrid() {
        const cid = document.getElementById('class-nav').value;
        document.getElementById('display-cid').innerText = "Class " + cid;
        const grid = document.getElementById('main-grid'); grid.innerHTML = '';
        const names = studio.classNames[cid] || [];
        for(let i=1; i<=30; i++) {
            const s = document.createElement('div');
            const studentName = names[i-1] || "";
            s.className = 'seat'; s.id = 'seat-'+i;
            s.innerHTML = `${i}<br><span style="font-size:0.8rem; color:#888;">${studentName}</span>`;
            s.onclick = () => { window.activeS = i; activeStudentName = studentName; openBooth(); };
            grid.appendChild(s);
        }
        setTimeout(attachListeners, 100);
    }
</script>
</body>
</html>
