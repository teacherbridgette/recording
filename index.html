<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wynn's Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --p: #6c5ce7; --bg: #f0f3f9; --s: #00b894; --e: #ff7675; --glass: rgba(255, 255, 255, 0.96);
        }
        
        body { 
            font-family: 'Fredoka', "Comic Sans MS", cursive; 
            background: #7a9e60 url('bg.png') no-repeat center center fixed; 
            background-size: cover; margin: 0; overflow: hidden;
        }

        .app { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); }

        .view { 
            width: 96%; height: 94%; background: var(--glass); 
            backdrop-filter: blur(20px); border-radius: 40px; 
            display: none; flex-direction: column; position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        #lobby { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 120px 50px 50px; box-sizing: border-box; }

        .grade-pill { 
            background: white; border-radius: 35px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; border: 5px solid transparent;
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
        }
        .grade-pill:hover { transform: translateY(-8px); border-color: var(--p); box-shadow: 0 20px 40px rgba(108, 92, 231, 0.2); }
        .grade-pill h2 { font-size: 2.5rem; color: var(--p); font-variant: small-caps; margin: 0; }

        .navbar { padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 0 50px 50px; overflow-y: auto; }

        .seat { 
            background: white; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 120px; cursor: pointer; transition: 0.2s; border: 3px solid #f0f0f0; text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.04);
        }
        .seat.done { background: var(--s); color: white; border-color: transparent; transform: scale(0.95); }
        .seat span.s-num { font-size: 2.2rem; font-weight: 700; display: block; }
        .seat small { font-size: 1rem; font-weight: 600; }

        .input-f { background: #f8faff; padding: 15px; border-radius: 18px; border: 2px solid #edf2f7; font-family: inherit; width: 100%; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 20px; border-radius: 30px; border: none; font-size: 1.8rem; font-weight: 700; color: white; cursor: pointer; font-variant: small-caps; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }

        #configModal, #modal { display: none; position: fixed; inset: 0; background: rgba(45, 52, 54, 0.4); backdrop-filter: blur(12px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-c { background: white; width: 90%; max-width: 750px; padding: 50px; border-radius: 50px; text-align: center; max-height: 90vh; overflow-y: auto; box-shadow: 0 40px 100px rgba(0,0,0,0.3); }
        
        #wordBox { font-size: clamp(2rem, 12vw, 5rem); color: var(--p); margin: 30px 0; font-weight: 700; font-variant: small-caps; min-height: 180px; display: flex; align-items: center; justify-content: center; line-height: 1.1; }
        
        .setup-row { display: grid; grid-template-columns: 1fr 1fr 100px; gap: 15px; align-items: center; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="app">
    <div id="lobby" class="view" style="display: grid;">
        <h1 style="position:absolute; top:35px; left:50%; transform:translateX(-50%); color:var(--p); font-variant: small-caps; font-size: 3rem; margin: 0; white-space: nowrap;">Teacher Wynn's Recording Studio</h1>
        <div class="grade-pill" onclick="openSetup(1)"><h2>Grade 1</h2></div>
        <div class="grade-pill" onclick="openSetup(2)"><h2>Grade 2</h2></div>
        <div class="grade-pill" onclick="openSetup(3)"><h2>Grade 3</h2></div>
        <div class="grade-pill" onclick="openSetup(4)"><h2>Grade 4</h2></div>
        <div class="grade-pill" onclick="openSetup(5)"><h2>Grade 5</h2></div>
        <div class="grade-pill" onclick="openSetup(6)"><h2>Grade 6</h2></div>
    </div>

    <div id="main" class="view">
        <div class="navbar">
            <button onclick="location.reload()" style="border:none; background:none; cursor:pointer; color:var(--p);"><i data-lucide="arrow-left-circle" size="48"></i></button>
            <div style="display:flex; gap:20px; align-items:center;">
                <span id="gLabel" style="font-size:2rem; font-weight:700; color:var(--p);"></span>
                <select id="classSel" class="input-f" style="width:auto; font-size:1.2rem;" onchange="renderGrid()"></select>
            </div>
            <i data-lucide="settings" style="cursor:pointer; color:var(--p);" size="40" onclick="document.getElementById('configModal').style.display='flex'"></i>
        </div>
        <div class="grid" id="seatGrid"></div>
    </div>
</div>

<div id="configModal">
    <div class="modal-c">
        <h2 style="color:var(--p); font-variant: small-caps; font-size: 2.5rem; margin-top: 0;">Grade <span id="confG"></span> Setup</h2>
        
        <div style="text-align:left; margin-bottom:25px;">
            <label><b>1. Google Drive Folder Link</b></label>
            <input type="text" id="driveLink" class="input-f" placeholder="Paste full URL here...">
        </div>

        <div style="text-align:left; margin-bottom:25px;">
            <label><b>2. Student Name Lists (.txt)</b></label>
            <input type="file" id="nameFiles" class="input-f" multiple accept=".txt">
            <small style="color:#636e72;">Upload files like "501.txt", "502.txt"...</small>
        </div>

        <div style="border-top: 2px solid #f1f2f6; padding-top: 20px;">
            <p style="text-align:left; font-weight: 700;">3. Material Capacity</p>
            <div class="setup-row">
                <span>Words:</span>
                <input type="file" id="file-words" class="input-f">
                <input type="number" id="qty-words" class="input-f" placeholder="Qty">
            </div>
            <div class="setup-row">
                <span>Sentences:</span>
                <input type="file" id="file-sentences" class="input-f">
                <input type="number" id="qty-sentences" class="input-f" placeholder="Qty">
            </div>
        </div>

        <button class="btn" style="background:var(--s); margin-top:30px;" onclick="saveAndLaunch()">Confirm & Start Studio ✨</button>
    </div>
</div>

<div id="modal">
    <div class="modal-c">
        <h2 id="sLabel" style="opacity:0.3; font-variant: small-caps; margin: 0;">Student</h2>
        <div id="wordCounter" style="color:var(--p); font-weight:700; font-size: 1.2rem; margin: 10px 0;">Item 1 of 1</div>
        <div id="wordBox">Ready?</div>
        
        <button id="startBtn" class="btn" style="background:var(--s);" onclick="startRecording()">Start Recording</button>
        
        <div id="recControls" style="display:none;">
            <button id="nextBtn" class="btn" style="background:var(--p); margin-bottom:15px;" onclick="nextItem()">Next Item</button>
            <button id="stopBtn" class="btn" style="background:var(--e);" onclick="stopRecording()">Stop & Save</button>
        </div>
        <div id="status" style="margin-top:20px; font-weight:700; color:var(--p); font-size: 1.4rem;">...</div>
        <button onclick="closeModal()" id="cancelBtn" style="margin-top:30px; border:none; background:none; color:#b2bec3; cursor:pointer; font-size: 1.1rem;">Cancel</button>
    </div>
</div>

<script>
    // YOUR DEPLOYED APPS SCRIPT URL
    const BRIDGE_URL = 'https://script.google.com/macros/s/AKfycbx-xIMK6qA_Md4-C4FW2VqbCVre9_xhXkMFjDKRCRFg6gKlyvV8xaJlAwmfxkoYOwA98Q/exec';
    
    let state = { g: 0, names: {}, pool: [], idx: 0, recorder: null, chunks: [], student: "", seat: 0 };

    lucide.createIcons();

    function openSetup(g) {
        state.g = g;
        document.getElementById('confG').innerText = g;
        document.getElementById('configModal').style.display = 'flex';
        if(localStorage.getItem('wynn_drive')) document.getElementById('driveLink').value = localStorage.getItem('wynn_drive');
    }

    async function saveAndLaunch() {
        const nFiles = document.getElementById('nameFiles').files;
        if(nFiles.length === 0) { alert("Please upload at least one class name file (.txt)"); return; }

        // Process Names
        for (let f of nFiles) {
            const cName = f.name.replace('.txt', '');
            const txt = await f.text();
            state.names[cName] = txt.split('\n').filter(n => n.trim());
        }

        // Process Materials (Randomize as requested)
        state.pool = [];
        await loadMaterials('file-words', 'qty-words');
        await loadMaterials('file-sentences', 'qty-sentences');
        if(state.pool.length === 0) state.pool = ["Ready to Record!"];

        // Setup Class Select
        const sel = document.getElementById('classSel');
        sel.innerHTML = '';
        Object.keys(state.names).sort().forEach(c => {
            sel.innerHTML += `<option value="${c}">${c}</option>`;
        });

        localStorage.setItem('wynn_drive', document.getElementById('driveLink').value);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('configModal').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        document.getElementById('gLabel').innerText = "Grade " + state.g;
        renderGrid();
    }

    async function loadMaterials(fid, qid) {
        const f = document.getElementById(fid).files[0];
        const q = parseInt(document.getElementById(qid).value) || 0;
        if (f) {
            let lines = (await f.text()).split('\n').filter(l => l.trim());
            lines = lines.sort(() => Math.random() - 0.5); // Randomization logic
            if (q > 0) lines = lines.slice(0, q);
            state.pool.push(...lines);
        }
    }

    function renderGrid() {
        const c = document.getElementById('classSel').value;
        const grid = document.getElementById('seatGrid');
        grid.innerHTML = '';
        const students = state.names[c] || [];
        students.forEach((name, i) => {
            const s = document.createElement('div');
            s.className = 'seat';
            s.id = `seat-${i+1}`;
            s.innerHTML = `<span class="s-num">${i+1}</span><small>${name}</small>`;
            s.onclick = () => openBooth(i+1, name);
            grid.appendChild(s);
        });
    }

    function openBooth(num, name) {
        state.student = name;
        state.seat = num;
        state.idx = 0;
        document.getElementById('sLabel').innerText = `${num}. ${name}`;
        updateBooth();
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('recControls').style.display = 'none';
        document.getElementById('status').innerText = "Ready to record";
    }

    function updateBooth() {
        document.getElementById('wordBox').innerText = state.pool[state.idx];
        document.getElementById('wordCounter').innerText = `Item ${state.idx + 1} of ${state.pool.length}`;
        document.getElementById('nextBtn').style.display = (state.idx >= state.pool.length - 1) ? 'none' : 'block';
    }

    function nextItem() { state.idx++; updateBooth(); }

    async function startRecording() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        state.recorder = new MediaRecorder(stream);
        state.chunks = [];
        state.recorder.ondataavailable = e => state.chunks.push(e.data);
        state.recorder.onstop = sendToDrive;
        state.recorder.start();
        
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('cancelBtn').style.display = 'none';
        document.getElementById('recControls').style.display = 'block';
        document.getElementById('status').innerText = "🔴 Recording...";
    }

    function stopRecording() {
        state.recorder.stop();
        document.getElementById('status').innerText = "⌛ Sending to Drive...";
    }

    function sendToDrive() {
        const reader = new FileReader();
        reader.readAsDataURL(new Blob(state.chunks, { type: 'audio/webm' }));
        reader.onloadend = () => {
            const base64Data = reader.result.split(',')[1];
            const className = document.getElementById('classSel').value;
            const payload = {
                audio: base64Data,
                filename: `${className}_Seat${state.seat}_${state.student}.webm`,
                className: className,
                folderUrl: document.getElementById('driveLink').value
            };

            fetch(BRIDGE_URL, { 
                method: 'POST', 
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload) 
            }).then(() => {
                document.getElementById('status').innerText = "✅ Saved Successfully!";
                document.getElementById(`seat-${state.seat}`).classList.add('done');
                setTimeout(closeModal, 1500);
            }).catch(err => {
                document.getElementById('status').innerText = "❌ Upload Error";
                console.error(err);
            });
        };
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
