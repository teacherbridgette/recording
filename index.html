<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher Wynn's Recording Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg-green: #7a9e60; 
            --sun-orange: #e2a87a; 
            --deep-brown: #665040;
            --paper-white: rgba(252, 251, 242, 0.94); 
            --primary: var(--bg-green);
            --secondary: var(--sun-orange); 
            --error: #ff7675;
        }
        
        body { 
            font-family: 'Fredoka', "Comic Sans MS", cursive; 
            background: var(--bg-green) url('bg.png') no-repeat center center fixed; 
            background-size: cover; margin: 0; overflow: hidden; color: var(--deep-brown);
        }

        .app { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.1); }

        /* Paper-style Container */
        .view { 
            width: 94%; height: 92%; background: var(--paper-white); 
            backdrop-filter: blur(10px); border-radius: 30px; 
            display: none; flex-direction: column; position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            border: 8px solid white;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Title Page / Grade Selection */
        #lobby { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 140px 60px 60px; box-sizing: border-box; }
        .title-header { 
            position: absolute; top: 40px; width: 100%; text-align: center; 
            font-size: 3.5rem; color: var(--deep-brown); font-variant: small-caps; 
            text-shadow: 2px 2px 0px white; margin: 0;
        }

        .grade-pill { 
            background: white; border-radius: 25px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; 
            border: 4px solid var(--sun-orange);
            box-shadow: 0 8px 0px var(--sun-orange);
        }
        .grade-pill:hover { transform: translateY(-5px); box-shadow: 0 12px 0px var(--sun-orange); }
        .grade-pill h2 { font-size: 2.5rem; margin: 0; color: var(--deep-brown); }

        /* Navigation Bar */
        .navbar { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #d1ccc0; }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 30px 40px; overflow-y: auto; }

        /* Seat Buttons */
        .seat { 
            background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 110px; cursor: pointer; transition: 0.2s; border: 3px solid #e0dcd0;
        }
        .seat.done { background: var(--bg-green); color: white; border-color: transparent; }
        .seat span.s-num { font-size: 2.2rem; font-weight: 700; }

        /* Forms & Modals */
        .input-f { background: white; padding: 12px; border-radius: 12px; border: 2px solid var(--sun-orange); font-family: inherit; width: 100%; box-sizing: border-box; color: var(--deep-brown); }
        .btn { width: 100%; padding: 18px; border-radius: 25px; border: none; font-size: 1.6rem; font-weight: 700; color: white; cursor: pointer; font-variant: small-caps; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

        #configModal, #modal { display: none; position: fixed; inset: 0; background: rgba(102, 80, 64, 0.4); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-c { background: var(--paper-white); width: 90%; max-width: 700px; padding: 40px; border-radius: 40px; text-align: center; border: 6px solid white; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        
        #wordBox { font-size: 4rem; color: var(--deep-brown); margin: 20px 0; font-weight: 700; font-variant: small-caps; min-height: 160px; display: flex; align-items: center; justify-content: center; border: 4px dashed var(--sun-orange); border-radius: 20px; padding: 20px; background: rgba(255,255,255,0.5); }
        
        .setup-row { display: grid; grid-template-columns: 100px 1fr 80px; gap: 10px; align-items: center; margin-bottom: 15px; text-align: left; font-weight: 600; }
    </style>
</head>
<body>

<div class="app">
    <div id="lobby" class="view" style="display: grid;">
        <h1 class="title-header">Recording Studio</h1>
        <div class="grade-pill" onclick="prepConfig(1)"><h2>G1</h2></div>
        <div class="grade-pill" onclick="prepConfig(2)"><h2>G2</h2></div>
        <div class="grade-pill" onclick="prepConfig(3)"><h2>G3</h2></div>
        <div class="grade-pill" onclick="prepConfig(4)"><h2>G4</h2></div>
        <div class="grade-pill" onclick="prepConfig(5)"><h2>G5</h2></div>
        <div class="grade-pill" onclick="prepConfig(6)"><h2>G6</h2></div>
    </div>

    <div id="main" class="view">
        <div class="navbar">
            <button onclick="location.reload()" style="border:none; background:none; cursor:pointer; color:var(--deep-brown);"><i data-lucide="home" size="32"></i></button>
            <div style="display:flex; gap:15px; align-items:center;">
                <span id="gLabel" style="font-size:1.8rem; font-weight:700; font-variant: small-caps;"></span>
                <select id="classSel" class="input-f" style="width:auto; padding: 5px 15px;" onchange="renderGrid()"></select>
            </div>
            <i data-lucide="settings" style="cursor:pointer;" size="32" onclick="document.getElementById('configModal').style.display='flex'"></i>
        </div>
        <div class="grid" id="seatGrid"></div>
    </div>
</div>

<div id="configModal">
    <div class="modal-c">
        <h2 style="margin-top:0; font-variant: small-caps;">Studio Configuration</h2>
        
        <div style="text-align:left; margin-bottom:20px;">
            <label><b>Google Drive Folder Link</b></label>
            <input type="text" id="driveLink" class="input-f" placeholder="https://drive.google.com/...">
        </div>

        <div style="text-align:left; margin-bottom:20px;">
            <label><b>Student Name Files (.txt)</b></label>
            <input type="file" id="nameFiles" class="input-f" multiple accept=".txt">
        </div>

        <div style="background: rgba(226, 168, 122, 0.1); padding: 15px; border-radius: 20px;">
            <p style="margin-top:0;"><b>Recording Materials (Auto-Randomized)</b></p>
            <div class="setup-row">
                <span>Words</span>
                <input type="file" id="file-words" class="input-f">
                <input type="number" id="qty-words" class="input-f" placeholder="Qty">
            </div>
            <div class="setup-row">
                <span>Sentences</span>
                <input type="file" id="file-sentences" class="input-f">
                <input type="number" id="qty-sentences" class="input-f" placeholder="Qty">
            </div>
        </div>

        <button class="btn" style="background:var(--bg-green); margin-top:20px; box-shadow: 0 6px 0px #5e7a4a;" onclick="launchStudio()">Launch Studio ✨</button>
    </div>
</div>

<div id="modal">
    <div class="modal-c">
        <h2 id="sLabel" style="opacity:0.6; font-variant: small-caps; margin:0;">Student</h2>
        <div id="wordCounter" style="font-weight:600; margin:10px 0;">Item 1 of 1</div>
        <div id="wordBox">Ready?</div>
        
        <button id="startBtn" class="btn" style="background:var(--bg-green); box-shadow: 0 6px 0px #5e7a4a;" onclick="startRec()">Start Recording</button>
        
        <div id="recControls" style="display:none;">
            <button id="nextBtn" class="btn" style="background:var(--sun-orange); margin-bottom:12px; box-shadow: 0 6px 0px #b58662;" onclick="nextItem()">Next Word</button>
            <button id="stopBtn" class="btn" style="background:var(--error); box-shadow: 0 6px 0px #c05857;" onclick="stopRec()">Stop & Save</button>
        </div>
        <div id="status" style="margin-top:20px; font-weight:700; color:var(--bg-green);">...</div>
        <button onclick="closeModal()" id="cancelBtn" style="margin-top:20px; border:none; background:none; color:var(--deep-brown); cursor:pointer; opacity:0.5;">Cancel</button>
    </div>
</div>

<script>
    // YOUR FINAL APPS SCRIPT URL
    const BRIDGE_URL = 'https://script.google.com/macros/s/AKfycbx-xIMK6qA_Md4-C4FW2VqbCVre9_xhXkMFjDKRCRFg6gKlyvV8xaJlAwmfxkoYOwA98Q/exec';
    
    let studio = { g: 0, names: {}, pool: [], idx: 0, recorder: null, chunks: [], student: "", seat: 0 };

    lucide.createIcons();

    function prepConfig(g) {
        studio.g = g;
        document.getElementById('confG').innerText = g;
        document.getElementById('configModal').style.display = 'flex';
        if(localStorage.getItem('wynn_drive')) document.getElementById('driveLink').value = localStorage.getItem('wynn_drive');
    }

    async function launchStudio() {
        const nFiles = document.getElementById('nameFiles').files;
        if(nFiles.length === 0) { alert("Please upload class .txt files"); return; }

        for (let f of nFiles) {
            const cName = f.name.replace('.txt', '');
            const txt = await f.text();
            studio.names[cName] = txt.split('\n').filter(n => n.trim());
        }

        studio.pool = [];
        await loadLines('file-words', 'qty-words');
        await loadLines('file-sentences', 'qty-sentences');
        if(studio.pool.length === 0) studio.pool = ["Practice makes perfect!"];

        const sel = document.getElementById('classSel');
        sel.innerHTML = '';
        Object.keys(studio.names).sort().forEach(c => {
            sel.innerHTML += `<option value="${c}">${c}</option>`;
        });

        localStorage.setItem('wynn_drive', document.getElementById('driveLink').value);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('configModal').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        document.getElementById('gLabel').innerText = "Grade " + studio.g;
        renderGrid();
    }

    async function loadLines(fid, qid) {
        const f = document.getElementById(fid).files[0];
        const q = parseInt(document.getElementById(qid).value) || 0;
        if (f) {
            let lines = (await f.text()).split('\n').filter(l => l.trim());
            lines = lines.sort(() => Math.random() - 0.5); // Randomization
            if (q > 0) lines = lines.slice(0, q);
            studio.pool.push(...lines);
        }
    }

    function renderGrid() {
        const c = document.getElementById('classSel').value;
        const grid = document.getElementById('seatGrid');
        grid.innerHTML = '';
        const students = studio.names[c] || [];
        students.forEach((name, i) => {
            const s = document.createElement('div');
            s.className = 'seat';
            s.id = `seat-${i+1}`;
            s.innerHTML = `<span class="s-num">${i+1}</span><small>${name}</small>`;
            s.onclick = () => openBooth(i+1, name);
            grid.appendChild(s);
        });
    }

    function openBooth(num, name) {
        studio.student = name; studio.seat = num; studio.idx = 0;
        document.getElementById('sLabel').innerText = `${num}. ${name}`;
        updateBooth();
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('recControls').style.display = 'none';
        document.getElementById('status').innerText = "Ready";
    }

    function updateBooth() {
        document.getElementById('wordBox').innerText = studio.pool[studio.idx];
        document.getElementById('wordCounter').innerText = `Item ${studio.idx + 1} of ${studio.pool.length}`;
        document.getElementById('nextBtn').style.display = (studio.idx >= studio.pool.length - 1) ? 'none' : 'block';
    }

    function nextItem() { studio.idx++; updateBooth(); }

    async function startRec() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        studio.recorder = new MediaRecorder(stream);
        studio.chunks = [];
        studio.recorder.ondataavailable = e => studio.chunks.push(e.data);
        studio.recorder.onstop = upload;
        studio.recorder.start();
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('recControls').style.display = 'block';
        document.getElementById('status').innerText = "🔴 Recording...";
    }

    function stopRec() {
        studio.recorder.stop();
        document.getElementById('status').innerText = "⌛ Sending to Drive...";
    }

    function upload() {
        const reader = new FileReader();
        reader.readAsDataURL(new Blob(studio.chunks, { type: 'audio/webm' }));
        reader.onloadend = () => {
            const payload = {
                audio: reader.result.split(',')[1],
                filename: `${document.getElementById('classSel').value}_Seat${studio.seat}_${studio.student}.webm`,
                className: document.getElementById('classSel').value,
                folderUrl: document.getElementById('driveLink').value
            };

            fetch(BRIDGE_URL, { 
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload) 
            }).then(() => {
                document.getElementById('status').innerText = "✅ Saved!";
                document.getElementById(`seat-${studio.seat}`).classList.add('done');
                setTimeout(closeModal, 1500);
            });
        };
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
