<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Wynn's Recording Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-green: #7a9e60; --sun-orange: #e2a87a; --deep-brown: #665040;
            --paper-white: rgba(252, 251, 242, 0.96); --primary: var(--bg-green);
            --secondary: var(--sun-orange); --accent: #a48c7e; --neon-glow: rgba(169, 204, 158, 0.8);
        }
        body { 
            font-family: 'Fredoka', 'Comic Sans MS', sans-serif; 
            background: #f0f4ef url('bg.png') no-repeat center center fixed; background-size: cover; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--deep-brown);
        }
        .studio-title { font-size: 3.5rem; color: white; text-shadow: 4px 4px 0 var(--deep-brown); text-align: center; margin-top: 50px; font-variant: small-caps; }
        .screen { display: none; width: 95%; max-width: 900px; padding: 20px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .card { background: var(--paper-white); border-radius: 40px; padding: 35px; border: 3px solid var(--accent); box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-top: 20px; backdrop-filter: blur(8px); }
        .btn { 
            padding: 18px 25px; border-radius: 25px; border: 2px solid transparent; font-size: 1.3rem; font-weight: 600; cursor: pointer; 
            background: var(--primary); color: white; box-shadow: 0 8px 0 #5a7a48; width: 100%; font-variant: small-caps; transition: all 0.2s ease;
        }
        .btn:hover, .seat:hover { box-shadow: 0 0 18px 6px var(--neon-glow), 0 8px 0 #5a7a48; transform: scale(1.02); border-color: #fff; }
        .btn:active, .seat:active { transform: translateY(4px); box-shadow: 0 0 20px 5px var(--sun-orange); }
        .btn-pink { background: var(--secondary); box-shadow: 0 8px 0 #b88661; }
        .setup-box { border: 2px dashed #ccc; border-radius: 20px; padding: 20px; margin-bottom: 20px; background: rgba(255,255,255,0.4); }
        .input-box { padding: 12px; border-radius: 12px; border: 2px solid #ccc; width: 100%; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        .class-card { background: white; border: 1px solid #ddd; border-radius: 15px; padding: 15px; margin-bottom: 12px; }
        .material-row { display: grid; grid-template-columns: 1.2fr 1fr 100px; gap: 15px; align-items: center; margin-bottom: 15px; }
        .seat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 15px; margin-top: 25px; }
        .seat { background: white; border-radius: 20px; padding: 25px 10px; text-align: center; border: 4px solid #eee; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
        .seat.done { background: #a9cc9e; color: white; border-color: #8fb376; }
        #word-display { font-size: 3.8rem; color: var(--secondary); text-align: center; margin: 35px 0; font-weight: 600; font-variant: small-caps; text-shadow: 2px 2px 0 white; line-height: 1.2; }
    </style>
</head>
<body>

    <audio id="snd-hover" src="hover.mp3" preload="auto"></audio>
    <audio id="snd-click" src="click.mp3" preload="auto"></audio>

    <div id="view-start" class="screen active">
        <h1 class="studio-title">Recording Studio</h1>
        <div class="card">
            <button class="btn" onclick="navToConfig('Elementary')">Elementary School</button>
            <div style="margin: 20px 0; text-align: center; font-weight: bold; color: var(--accent);">CLASS SELECTION</div>
            <button class="btn btn-pink" onclick="navToConfig('Junior High')">Junior High School</button>
        </div>
    </div>

    <div id="view-config" class="screen">
        <div class="card">
            <h2 style="margin-top:0;">Configuration</h2>
            <div class="setup-box">
                <strong>Drive Folder URL</strong>
                <input type="text" id="drive-url" class="input-box" placeholder="Paste Shared Folder Link here..." style="margin-top:8px;">
            </div>
            <div class="setup-box">
                <h3>Classes</h3>
                <input type="number" id="num-classes" class="input-box" value="3" onchange="buildClassInputs()" style="width: 80px;">
                <div id="class-list" style="margin-top:15px;"></div>
            </div>
            <div class="setup-box">
                <h3>Materials & Phonics</h3>
                <div class="material-row">
                    <div><strong>Words:</strong><br><input type="file" id="up-words"></div>
                    <select id="mode-words" class="input-box" onchange="toggleQty('words')"><option value="rnd">Random</option><option value="all">All</option></select>
                    <input type="number" id="qty-words" class="input-box" placeholder="Qty">
                </div>
                <div class="material-row">
                    <div><strong>Sentences:</strong><br><input type="file" id="up-sentences"></div>
                    <select id="mode-sentences" class="input-box" onchange="toggleQty('sentences')"><option value="rnd">Random</option><option value="all">All</option></select>
                    <input type="number" id="qty-sentences" class="input-box" placeholder="Qty">
                </div>
                <div class="material-row">
                    <div><strong>Phonics:</strong><br><input type="file" id="up-phonics"></div>
                    <select id="mode-phonics" class="input-box" onchange="toggleQty('phonics')"><option value="rnd">Random</option><option value="all">All</option></select>
                    <input type="number" id="qty-phonics" class="input-box" placeholder="Qty">
                </div>
            </div>
            <button class="btn" style="background:#8fb376;" onclick="startStudio()">Open Studio 🚀</button>
        </div>
    </div>

    <div id="view-grid" class="screen">
        <h2 id="display-cid" style="text-align:center;">Class</h2>
        <div style="text-align:center;"><select id="class-nav" class="input-box" style="width:auto;" onchange="renderGrid()"></select></div>
        <div id="main-grid" class="seat-grid"></div>
        <button class="btn btn-pink" style="margin-top:30px;" onclick="showView('view-config')">Back</button>
    </div>

    <div id="view-recorder" class="screen">
        <div class="card" style="text-align: center;">
            <div id="status-msg" style="color:var(--accent); font-weight:bold;">READY</div>
            <h2 id="student-name-display">Student</h2>
            <div id="word-display">...</div>
            <div id="rating-display" style="font-size: 2.5rem; font-weight: 600;">Score: --/10</div>
            <div style="display:flex; gap:15px; margin-top:20px;">
                <button id="mic-btn" class="btn" style="flex:2" onclick="toggleMic()">🎤 Record</button>
                <button class="btn btn-pink" style="flex:1" onclick="showView('view-grid')">Back</button>
            </div>
        </div>
    </div>

<script>
    const BRIDGE_URL = "https://script.google.com/macros/s/AKfycbx9fOR45DjrAi6SYTu3W18XxELVJZ3ZQOmCjvV_QRrKibek_m3ymZ2kcPjLU7ZD1r3XdQ/exec";
    const hSnd = document.getElementById('snd-hover'), cSnd = document.getElementById('snd-click');
    let studio = { prefix: '', pool: [], classNames: {} }, isRec = false, mediaRec, chunks = [], recognition, latestScore = 6;
    let activeStudentName = "", currentPromptIndex = 0, currentStudentPrompts = [];

    function playClick() { cSnd.currentTime = 0; cSnd.play().catch(()=>{}); }
    function playHover() { hSnd.currentTime = 0; hSnd.play().catch(()=>{}); }
    function attachListeners() {
        document.querySelectorAll('.btn, .seat, .class-card').forEach(t => { t.onmouseenter = playHover; t.onmousedown = playClick; });
    }
    const obs = new MutationObserver(attachListeners); obs.observe(document.body, { childList: true, subtree: true });

    if(localStorage.getItem('saved_drive_link')) document.getElementById('drive-url').value = localStorage.getItem('saved_drive_link');

    function showView(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); attachListeners(); }
    function navToConfig(type) { studio.prefix = type === 'Elementary' ? '4' : '7'; buildClassInputs(); showView('view-config'); }
    function toggleQty(type) { document.getElementById('qty-'+type).disabled = (document.getElementById('mode-'+type).value === 'all'); }

    function buildClassInputs() {
        const num = document.getElementById('num-classes').value, area = document.getElementById('class-list'); area.innerHTML = '';
        for(let i=1; i<=num; i++) {
            const cid = `${studio.prefix}0${i}`;
            area.innerHTML += `<div class="class-card"><strong>Class ${cid} Names:</strong><input type="file" id="names-${cid}" class="input-box" accept=".txt"></div>`;
        }
    }

    async function startStudio() {
        const dUrl = document.getElementById('drive-url').value; if(!dUrl) return alert("Paste Drive Link!");
        localStorage.setItem('saved_drive_link', dUrl);
        studio.pool = [];
        await loadLines('up-words', 'words'); await loadLines('up-sentences', 'sentences'); await loadLines('up-phonics', 'phonics');
        const num = document.getElementById('num-classes').value, nav = document.getElementById('class-nav'); nav.innerHTML = '';
        for(let i=1; i<=num; i++) {
            const cid = `${studio.prefix}0${i}`; nav.innerHTML += `<option value="${cid}">Class ${cid}</option>`;
            const nf = document.getElementById('names-'+cid).files[0];
            if(nf) studio.classNames[cid] = (await nf.text()).split('\n').map(n => n.trim()).filter(n => n);
        }
        renderGrid(); showView('view-grid');
    }

    async function loadLines(id, type) {
        const f = document.getElementById(id).files[0]; if(!f) return;
        let lines = (await f.text()).split('\n').filter(l => l.trim());
        if(document.getElementById('mode-'+type).value === 'rnd') lines = lines.sort(() => 0.5 - Math.random()).slice(0, parseInt(document.getElementById('qty-'+type).value) || 5);
        studio.pool.push(...lines);
    }

    function renderGrid() {
        const cid = document.getElementById('class-nav').value; document.getElementById('display-cid').innerText = "Class " + cid;
        const grid = document.getElementById('main-grid'); grid.innerHTML = '';
        const names = studio.classNames[cid] || [];
        for(let i=1; i<=30; i++) {
            const s = document.createElement('div'); const name = names[i-1] || "";
            s.className = 'seat'; s.id = 'seat-'+i; s.innerHTML = `${i}<br><span style="font-size:0.8rem;opacity:0.7">${name}</span>`;
            s.onclick = () => { window.activeS = i; activeStudentName = name; openBooth(); }; grid.appendChild(s);
        }
    }

    function openBooth() { activeStudentName = activeStudentName; currentStudentPrompts = [...studio.pool]; currentPromptIndex = 0; latestScore = 6; updateUI(); showView('view-recorder'); }
    function updateUI() { document.getElementById('word-display').innerText = currentStudentPrompts[currentPromptIndex] || "Done!"; document.getElementById('status-msg').innerText = `ITEM ${currentPromptIndex+1}/${currentStudentPrompts.length}`; document.getElementById('rating-display').innerText = "Score: --/10"; document.getElementById('student-name-display').innerText = `${window.activeS}. ${activeStudentName || 'Student'}`; }

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.onresult = (e) => {
            const conf = e.results[0][0].confidence;
            latestScore = Math.min(10, Math.max(6, Math.round((conf * 4) + 6)));
            document.getElementById('rating-display').innerText = "Score: " + latestScore + "/10 🌟";
        };
    }

    async function toggleMic() {
        const btn = document.getElementById('mic-btn');
        if(!isRec) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRec = new MediaRecorder(stream); chunks = [];
            mediaRec.ondataavailable = e => chunks.push(e.data); mediaRec.onstop = upload;
            mediaRec.start(); recognition.start(); isRec = true; btn.innerText = "🛑 Stop"; btn.style.background = "var(--secondary)";
        } else {
            mediaRec.stop(); recognition.stop(); isRec = false; btn.innerText = "🎤 Record"; btn.style.background = "var(--primary)";
        }
    }

    async function upload() {
        document.getElementById('status-msg').innerText = "SAVING...";
        const reader = new FileReader();
        reader.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
        reader.onloadend = async () => {
            const payload = { audio: reader.result.split(',')[1], filename: `${window.activeS}_${activeStudentName || 'S'}_${latestScore}.webm`, folderUrl: document.getElementById('drive-url').value };
            try {
                await fetch(BRIDGE_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
                if (currentPromptIndex < currentStudentPrompts.length - 1) { currentPromptIndex++; updateUI(); } 
                else { document.getElementById('seat-'+window.activeS).classList.add('done'); showView('view-grid'); }
            } catch (err) { alert("Upload failed."); }
        };
    }
</script>
</body>
</html>
