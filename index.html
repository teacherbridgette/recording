<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Wynn's English Recording Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-green: #7a9e60;
            --sun-orange: #e2a87a;
            --deep-brown: #665040;
            --paper-white: rgba(252, 251, 242, 0.96);
            --primary: var(--bg-green);
            --secondary: var(--sun-orange);
            --accent: #a48c7e;
            --neon-green: #a9cc9e;
        }

        body { 
            font-family: 'Fredoka', 'Comic Sans MS', sans-serif; 
            background: #f4f1de; margin: 0; display: flex; 
            flex-direction: column; align-items: center; min-height: 100vh;
            color: var(--deep-brown);
        }

        .widget-bar { position: fixed; top: 15px; right: 15px; display: flex; gap: 12px; z-index: 1000; }
        .widget-btn {
            background: white; border: 3px solid var(--primary); border-radius: 50%;
            width: 50px; height: 50px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 1.3rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s;
        }

        .studio-title { 
            font-size: 3.2rem; color: var(--primary); text-shadow: 2px 2px 0 white; 
            text-align: center; margin-top: 50px; font-variant: small-caps;
        }

        .screen { display: none; width: 95%; max-width: 900px; padding: 20px; box-sizing: border-box; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .card { 
            background: var(--paper-white); border-radius: 45px; padding: 35px; 
            border: 5px solid var(--accent); box-shadow: 0 20px 45px rgba(0,0,0,0.1);
            margin-top: 20px; backdrop-filter: blur(8px);
        }

        .btn { 
            padding: 20px 30px; border: 3px solid transparent; border-radius: 25px; font-size: 1.3rem; 
            font-weight: 600; cursor: pointer; background: var(--primary); color: white; 
            box-shadow: 0 8px 0 #5a7a48; margin: 12px 0; width: 100%; font-variant: small-caps; 
            transition: all 0.2s ease;
        }
        .btn:hover { border-color: #fff; transform: scale(1.02); }
        .btn-pink { background: var(--secondary); box-shadow: 0 8px 0 #b88661; }
        .btn-green { background: #8fb376; box-shadow: 0 8px 0 #6d8a57; }

        .config-section { background: rgba(255, 255, 255, 0.6); border-radius: 20px; padding: 20px; margin: 15px 0; border: 2px dashed var(--accent); }
        .input-box { padding: 10px; border-radius: 12px; border: 2px solid #ccc; width: 100%; font-family: inherit; font-size: 1rem; box-sizing: border-box; }

        .seat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; margin-top: 25px; }
        .seat { 
            background: white; border-radius: 20px; padding: 25px 10px; 
            text-align: center; border: 4px solid #eee; cursor: pointer; 
            font-weight: bold; font-size: 1.2rem; transition: 0.3s;
        }
        .seat.done { background: #8fb376 !important; color: white !important; border-color: #6d8a57 !important; }

        #word-display { font-size: 4.5rem; color: var(--secondary); text-align: center; margin: 25px 0; font-variant: small-caps; font-weight: 600; text-shadow: 2px 2px 0 white; }
        #rating-display { font-size: 3.5rem; font-weight: 600; color: var(--deep-brown); margin: 10px 0; }

        footer { margin-top: auto; padding: 20px; text-align: center; width: 100%; font-weight: 600; font-size: 0.9rem; color: var(--accent); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="widget-bar">
        <button class="widget-btn" onclick="toggleFS()">📺</button>
        <button class="widget-btn" onclick="clearCache()">🧹</button>
    </div>

    <div id="view-start" class="screen active">
        <h1 class="studio-title">Teacher Wynn's Recording Studio</h1>
        <div class="card">
            <button class="btn" onclick="navGrades('Elementary')">Elementary School</button>
            <button class="btn btn-pink" onclick="navGrades('Junior High')">Junior High School</button>
        </div>
    </div>

    <div id="view-grades" class="screen">
        <h2 style="text-align:center;">Select Grade</h2>
        <div id="grade-btns" class="card" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px;"></div>
        <button class="btn" style="background:#888; box-shadow:0 8px 0 #555" onclick="showView('view-start')">Back</button>
    </div>

    <div id="view-config" class="screen">
        <div class="card">
            <h2 style="color: var(--primary)">Studio Setup</h2>
            <div class="config-section">
                <h3>1. Storage (Google Drive Link)</h3>
                <input type="text" id="drive-link" class="input-box" placeholder="Paste Folder Link..." onchange="saveDriveLink()">
            </div>
            <div class="config-section">
                <h3>2. Class Setup</h3>
                <input type="number" id="num-classes" class="input-box" value="3" onchange="buildClassInputs()">
                <div id="class-entry-area" style="margin-top:10px;"></div>
            </div>
            <div class="config-section">
                <h3>3. Materials (.txt files)</h3>
                <input type="file" id="up-pool" class="input-box">
                <p style="font-size: 0.8rem; color: #666;">Upload one TXT file with words/sentences on each line.</p>
            </div>
            <button class="btn btn-green" onclick="startSession()">Open Studio 🚀</button>
        </div>
    </div>

    <div id="view-grid" class="screen">
        <h2 id="display-cid" style="font-size: 2.5rem; color:var(--primary);">Class</h2>
        <select id="class-nav" class="input-box" style="width: auto; min-width: 180px;" onchange="renderGrid()"></select>
        <div id="main-grid" class="seat-grid"></div>
        <button class="btn" style="background:#888; box-shadow:0 8px 0 #555; margin-top:30px;" onclick="showView('view-config')">Settings</button>
    </div>

    <div id="view-recorder" class="screen">
        <div class="card" style="text-align: center;">
            <div id="status-msg" style="font-weight:bold; color:var(--accent);">Ready</div>
            <h2 id="student-name-display" style="color: var(--primary);">Student</h2>
            <div id="word-display">...</div>
            <div id="rating-display" class="hidden">Score: --/10</div>
            
            <div style="display:flex; gap:15px; flex-direction: column;">
                <button id="mic-btn" class="btn btn-green" onclick="toggleMic()">🎤 Record</button>
                <button id="next-btn" class="btn btn-pink hidden" onclick="handleNext()">Next Word ➔</button>
                <button id="back-btn" class="btn" style="background:#888; box-shadow:0 8px 0 #555" onclick="showView('view-grid')">Back to Grid</button>
            </div>
        </div>
    </div>

    <footer>Teacher Wynn | Taiwan TFETP | Bilingual 2030</footer>

<script>
    // --- CONFIGURATION ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3cd7Qwvi9MU3Uua4J4ZbsGu3t3kpGlhewYH-O-6YA2ztnqF-Vk5Cu_60WABIkWeo2/exec";
    
    let studio = { grade: '', pool: [], classNames: {}, driveLink: '' };
    let isRec = false, mediaRec, chunks = [], recognition, latestScore = 0;
    let activeStudentName = "", currentPromptIndex = 0, currentStudentPrompts = [];
    let sessionScores = [], sessionAudioChunks = [];

    // --- SPEECH RECOGNITION (KIND TEACHER LOGIC) ---
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript.toLowerCase().trim();
            const target = currentStudentPrompts[currentPromptIndex].toLowerCase().trim();
            
            if (transcript === target) latestScore = 10;
            else if (transcript.includes(target) || target.includes(transcript)) latestScore = 9;
            else if (transcript[0] === target[0]) latestScore = 8;
            else latestScore = 7; // Participation points!
            
            document.getElementById('status-msg').innerText = `Teacher heard: "${transcript}"`;
        };
    }

    window.onload = () => {
        const savedLink = localStorage.getItem('wynn_drive_link');
        if(savedLink) { document.getElementById('drive-link').value = savedLink; studio.driveLink = savedLink; }
    };

    function saveDriveLink() {
        studio.driveLink = document.getElementById('drive-link').value;
        localStorage.setItem('wynn_drive_link', studio.driveLink);
    }

    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function navGrades(type) {
        const container = document.getElementById('grade-btns'); container.innerHTML = '';
        const grades = type === 'Elementary' ? [1,2,3,4,5,6] : [7,8,9];
        grades.forEach(g => {
            const b = document.createElement('button');
            b.className = 'btn'; b.innerText = 'Grade ' + g;
            b.onclick = () => { studio.grade = g; buildConfig(); };
            container.appendChild(b);
        });
        showView('view-grades');
    }

    function buildConfig() { buildClassInputs(); showView('view-config'); }

    function buildClassInputs() {
        const num = document.getElementById('num-classes').value;
        const area = document.getElementById('class-entry-area'); area.innerHTML = '';
        for(let i=1; i<=num; i++) {
            const cid = `${studio.grade}0${i}`;
            area.innerHTML += `<div style="background:white; padding:10px; margin-bottom:8px; border-radius:12px; border:1px solid #ddd;">
                <strong>Class ${cid} Name List (.txt)</strong><br>
                <input type="file" id="names-${cid}" class="input-box" style="margin-top:5px;" accept=".txt">
            </div>`;
        }
    }

    async function startSession() {
        const poolFile = document.getElementById('up-pool').files[0];
        if(!poolFile) return alert("Please upload your word list TXT file!");
        studio.pool = (await poolFile.text()).split('\n').map(l => l.trim()).filter(l => l);

        const num = document.getElementById('num-classes').value;
        const nav = document.getElementById('class-nav'); nav.innerHTML = '';
        for(let i=1; i<=num; i++) {
            const cid = `${studio.grade}0${i}`;
            nav.innerHTML += `<option value="${cid}">Class ${cid}</option>`;
            const f = document.getElementById('names-'+cid).files[0];
            if(f) {
                const text = await f.text();
                studio.classNames[cid] = text.split('\n').map(n => n.trim()).filter(n => n);
            }
        }
        renderGrid(); showView('view-grid');
    }

    function renderGrid() {
        const cid = document.getElementById('class-nav').value;
        document.getElementById('display-cid').innerText = "Class " + cid;
        const grid = document.getElementById('main-grid'); grid.innerHTML = '';
        const names = studio.classNames[cid] || [];
        for(let i=1; i<=30; i++) {
            const s = document.createElement('div');
            const sName = names[i-1] || "";
            s.className = 'seat'; s.id = 'seat-'+i;
            s.innerHTML = `${i}<br><span style="font-size:0.8rem; color:#888;">${sName}</span>`;
            s.onclick = () => { window.activeS = i; activeStudentName = sName; openBooth(); };
            grid.appendChild(s);
        }
    }

    function openBooth() {
        document.getElementById('student-name-display').innerText = activeStudentName ? `${window.activeS}. ${activeStudentName}` : `Student ${window.activeS}`;
        currentStudentPrompts = [...studio.pool].sort(() => 0.5 - Math.random()).slice(0, 3); // 3 items per session
        currentPromptIndex = 0; sessionScores = []; sessionAudioChunks = [];
        resetBoothUI();
        showView('view-recorder');
    }

    function resetBoothUI() {
        latestScore = 0;
        document.getElementById('word-display').innerText = currentStudentPrompts[currentPromptIndex];
        document.getElementById('status-msg').innerText = `Item ${currentPromptIndex + 1} of ${currentStudentPrompts.length}`;
        document.getElementById('rating-display').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('mic-btn').classList.remove('hidden');
        document.getElementById('mic-btn').innerText = "🎤 Record";
    }

    async function toggleMic() {
        const btn = document.getElementById('mic-btn');
        if(!isRec) {
            latestScore = 1;
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRec = new MediaRecorder(stream);
            chunks = []; 
            mediaRec.ondataavailable = e => chunks.push(e.data);
            mediaRec.start(); 
            if(recognition) recognition.start();
            isRec = true; btn.innerText = "✅ Done";
        } else {
            mediaRec.stop(); isRec = false;
            setTimeout(() => {
                document.getElementById('rating-display').innerText = "Score: " + latestScore + "/10";
                document.getElementById('rating-display').classList.remove('hidden');
                btn.classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('next-btn').innerText = (currentPromptIndex === currentStudentPrompts.length - 1) ? "💾 Save Session" : "Next Word ➔";
            }, 300);
        }
    }

    function handleNext() {
        sessionScores.push(latestScore);
        sessionAudioChunks.push(...chunks);
        if (currentPromptIndex < currentStudentPrompts.length - 1) {
            currentPromptIndex++;
            resetBoothUI();
        } else {
            uploadFinalSession();
        }
    }

    async function uploadFinalSession() {
        document.getElementById('status-msg').innerText = "Saving to Google Drive...";
        document.getElementById('next-btn').classList.add('hidden');
        
        const blob = new Blob(sessionAudioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const safeName = activeStudentName.replace(/[^a-z0-9]/gi, '_') || "Student";
            const scoreStr = sessionScores.join('-');
            const fname = `${window.activeS.toString().padStart(2, '0')}_${safeName}(${scoreStr}).webm`;
            const folderIdMatch = studio.driveLink.match(/[-\w]{25,}/);

            const payload = {
                audio: base64,
                filename: fname,
                className: document.getElementById('class-nav').value,
                folderId: folderIdMatch ? folderIdMatch[0] : "",
                studentName: activeStudentName,
                scores: scoreStr
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('status-msg').innerText = "Saved Successfully!";
                document.getElementById('seat-'+window.activeS).classList.add('done');
                setTimeout(() => showView('view-grid'), 1500);
            } catch (err) {
                document.getElementById('status-msg').innerText = "Upload Error!";
                document.getElementById('next-btn').classList.remove('hidden');
            }
        };
    }

    function toggleFS() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    function clearCache() { if(confirm("Clear everything?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
