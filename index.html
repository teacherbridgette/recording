<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher Wynn's Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #00b894; --e: #ff7675; --teal: #00bfa5; --glass: rgba(255, 255, 255, 0.92); --bg-input: #f0f3f7; }
        
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: url('bg.png') no-repeat center center fixed; 
            background-size: cover; margin: 0; overflow: hidden; 
        }

        .view { width: 96vw; height: 92vh; background: var(--glass); backdrop-filter: blur(15px); border-radius: 40px; display: none; margin: 4vh auto; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.15); flex-direction: column; }

        /* Setup Modal Styling */
        #configModal { display: flex; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-c { background: white; width: 90%; max-width: 800px; padding: 40px; border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); text-align: center; }
        
        .comic-text { font-family: 'Comic Sans MS', 'Comic Sans', cursive; }
        .input-f { background: var(--bg-input); padding: 12px 15px; border-radius: 15px; border: 2px solid #e2e8f0; width: 100%; box-sizing: border-box; font-family: inherit; font-size: 1rem; margin-top: 5px; }
        .confirm-btn { background: var(--teal); color: white; width: 100%; padding: 20px; border-radius: 50px; border: none; font-size: 1.8rem; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .confirm-btn:hover { transform: scale(1.02); }

        /* Recording Part Styling */
        #recorderUI { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        #wordBox { 
            font-size: 4.5rem; min-height: 220px; display: flex; align-items: center; justify-content: center; 
            color: var(--e); font-weight: 700; background: #fffdfd; border-radius: 25px; border: 4px dashed #ffeaa7; margin: 25px 0;
        }

        /* Student Grid */
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px 40px; overflow-y: auto; }
        .seat { background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 110px; cursor: pointer; border: 3px solid #eee; transition: 0.2s; }
        .seat.done { background: var(--s); color: white; border-color: #008a6e; }
        
        .footer { position: fixed; bottom: 15px; width: 100%; text-align: center; color: #666; font-weight: 600; pointer-events: none; }
    </style>
</head>
<body>

<audio id="sndHover" src="hover.mp3"></audio>
<audio id="sndClick" src="click.mp3"></audio>

<div id="configModal">
    <div class="modal-c">
        <h2 style="color:var(--p); font-size:2.2rem; margin:0 0 20px 0;">Classroom Setup</h2>
        <div style="text-align:left; margin-bottom:15px;">
            <label>Google Drive Folder ID</label>
            <input type="text" id="driveLink" class="input-f" placeholder="Paste Folder ID here...">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:15px;">
            <div style="text-align:left;"><label>Total Classes</label><input type="number" id="classCount" class="input-f" value="6"></div>
            <div style="text-align:left;"><label>Student Roster (.xlsx)</label><input type="file" id="namesFile" class="input-f" accept=".xlsx"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px; text-align:left;">
            <div><b>Words</b><input type="file" id="fWords" class="input-f"><input type="number" id="nWords" class="input-f" placeholder="Qty"></div>
            <div><b>Sentences</b><input type="file" id="fSents" class="input-f"><input type="number" id="nSents" class="input-f" placeholder="Qty"></div>
            <div><b>Phonics</b><input type="file" id="fPhonics" class="input-f"><input type="number" id="nPhonics" class="input-f" placeholder="Qty"></div>
        </div>
        <div style="text-align:left; margin-top:15px;">
            <label style="cursor:pointer;"><input type="checkbox" id="randomizeCheck" checked> Randomize material order?</label>
        </div>
        <button class="confirm-btn" onclick="confirmSetup()">Confirm & Start</button>
    </div>
</div>

<div id="main" class="view">
    <div style="padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="color:var(--p); margin:0;">Grade <span id="gLabel"></span></h1>
        <select id="classSel" class="input-f" style="width:auto;"></select>
        <button onclick="location.reload()" style="background:none; border:none; cursor:pointer;"><i data-lucide="refresh-cw" color="#6c5ce7"></i></button>
    </div>
    <div class="grid" id="seatGrid"></div>
</div>

<div id="recorderUI">
    <div class="modal-c">
        <h2 id="sLabel" class="comic-text" style="color:#555; font-size:2rem;">Student</h2>
        <div id="wordBox" class="comic-text">Ready?</div>
        <div id="startArea">
            <button class="confirm-btn" style="background:var(--s);" onclick="startRec()">Start Recording</button>
        </div>
        <div id="recControls" style="display:none;">
            <div style="display:flex; gap:15px;">
                <button class="confirm-btn" style="background:var(--p); flex:2;" onclick="nextWord()">Next Item</button>
                <button class="confirm-btn" style="background:var(--e); flex:1;" onclick="stopRec()">Finish & Save</button>
            </div>
            <p id="status" style="color:var(--p); font-weight:700; margin-top:20px; font-size:1.2rem;"></p>
        </div>
    </div>
</div>

<div class="footer">Teacher Wynn | Studio Pro 2026</div>

<script>
    const webAppURL = 'https://script.google.com/macros/s/AKfycbwEBQC7zltIZDJcM4bRhvXzj-2_VO6AZA9MPz9Z5arzkp8eArhGH1kTunIS7M8xQHmGnw/exec';
    let activeNames = [], playlist = [], currentIdx = 0, recorder, chunks = [], stream, curEl, curSeat;
    let materials = { words: [], sents: [], phonics: [] };

    lucide.createIcons();
    function playClick() { document.getElementById('sndClick').play().catch(()=>{}); }

    async function parse(f) {
        if(!f) return [];
        return new Promise(res => {
            const r = new FileReader();
            r.onload = e => {
                const b = XLSX.read(e.target.result, {type:'binary'});
                res(XLSX.utils.sheet_to_json(b.Sheets[b.SheetNames[0]], {header:1}).flat().filter(x=>x));
            }; r.readAsBinaryString(f);
        });
    }

    async function confirmSetup() {
        const nf = document.getElementById('namesFile').files[0];
        activeNames = nf ? await parse(nf) : Array.from({length:30}, (_,i)=>"Student "+(i+1));
        materials.words = await parse(document.getElementById('fWords').files[0]);
        materials.sents = await parse(document.getElementById('fSents').files[0]);
        materials.phonics = await parse(document.getElementById('fPhonics').files[0]);
        
        document.getElementById('configModal').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        
        const sel = document.getElementById('classSel');
        for(let i=1; i<=document.getElementById('classCount').value; i++) {
            sel.innerHTML += `<option value="Class${i}">Class ${i}</option>`;
        }

        const grid = document.getElementById('seatGrid');
        activeNames.forEach((name, i) => {
            const div = document.createElement('div'); div.className = 'seat';
            div.innerHTML = `<b style="font-size:1.5rem">${i+1}</b><span class="comic-text">${name}</span>`;
            div.onclick = () => {
                playClick(); curEl = div; curSeat = i+1;
                document.getElementById('sLabel').innerText = name;
                
                const rand = document.getElementById('randomizeCheck').checked;
                const pick = (arr, n) => {
                    let items = [...arr]; if(rand) items.sort(()=>.5-Math.random());
                    return n ? items.slice(0, n) : items;
                };

                playlist = [
                    ...pick(materials.words, document.getElementById('nWords').value),
                    ...pick(materials.sents, document.getElementById('nSents').value),
                    ...pick(materials.phonics, document.getElementById('nPhonics').value)
                ];

                currentIdx = 0;
                document.getElementById('wordBox').innerText = playlist[0] || "No items!";
                document.getElementById('recorderUI').style.display = 'flex';
                document.getElementById('startArea').style.display = 'block';
                document.getElementById('recControls').style.display = 'none';
            };
            grid.appendChild(div);
        });
    }

    async function startRec() {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream); chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = upload; recorder.start();
        document.getElementById('startArea').style.display = 'none';
        document.getElementById('recControls').style.display = 'block';
        document.getElementById('status').innerText = "🔴 Recording Active...";
    }

    function nextWord() {
        currentIdx++;
        document.getElementById('wordBox').innerText = playlist[currentIdx] || "All Finished!";
    }

    function stopRec() {
        recorder.stop();
        stream.getTracks().forEach(t => t.stop());
        document.getElementById('status').innerText = "⏳ Saving to Drive...";
    }

    function upload() {
        const r = new FileReader(); r.readAsDataURL(new Blob(chunks, {type:'audio/webm'}));
        r.onloadend = () => {
            const folder = document.getElementById('driveLink').value.trim();
            const payload = `audio=${encodeURIComponent(r.result.split(',')[1])}&filename=${encodeURIComponent('Seat'+curSeat+'_'+document.getElementById('sLabel').innerText+'.webm')}&folderId=${folder}&className=${document.getElementById('classSel').value}`;
            
            fetch(webAppURL, { method: 'POST', body: payload, headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, mode: 'no-cors' })
            .then(() => {
                curEl.classList.add('done');
                document.getElementById('recorderUI').style.display = 'none';
                document.getElementById('status').innerText = "";
            });
        };
    }
</script>
</body>
</html>
