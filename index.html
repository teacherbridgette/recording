<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher Wynn's Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #00b894; --e: #ff7675; --teal: #00bfa5; --glass: rgba(255, 255, 255, 0.9); --bg-input: #f0f3f7; }
        
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: url('bg.png') no-repeat center center fixed; 
            background-size: cover; margin: 0; overflow: hidden; 
        }

        .view { width: 96vw; height: 92vh; background: var(--glass); backdrop-filter: blur(15px); border-radius: 40px; display: none; margin: 4vh auto; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.15); flex-direction: column; }

        /* Configuration Modal */
        #configModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-c { background: white; width: 90%; max-width: 800px; padding: 40px; border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .input-f { background: var(--bg-input); padding: 15px 20px; border-radius: 18px; border: 2px solid #e2e8f0; width: 100%; box-sizing: border-box; font-family: inherit; font-size: 1rem; margin-top: 5px; }
        .confirm-btn { background: var(--teal); color: white; width: 100%; padding: 20px; border-radius: 50px; border: none; font-size: 1.8rem; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s; }

        /* RECORDING PART UI */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); z-index: 2000; align-items: center; justify-content: center; }
        .record-box { 
            background: white; width: 85%; max-width: 750px; padding: 50px; border-radius: 40px; text-align: center; 
            border: 8px solid var(--p); box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }
        
        /* Font logic for Student and Content */
        .comic-text { font-family: 'Comic Sans MS', 'Comic Sans', cursive; }
        #sLabel { font-size: 2.5rem; color: #555; margin-bottom: 20px; font-variant: small-caps; }
        #wordBox { 
            font-size: 5rem; min-height: 250px; display: flex; align-items: center; justify-content: center; 
            color: var(--e); font-weight: 700; line-height: 1.1; margin: 20px 0;
            background: #fff9f9; border-radius: 30px; border: 4px dashed #ffeaa7;
        }

        /* Grid UI */
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px 40px; overflow-y: auto; }
        .seat { background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 110px; cursor: pointer; border: 3px solid #eee; transition: 0.2s; }
        .seat.done { background: var(--s); color: white; border-color: #008a6e; }
        .footer { position: fixed; bottom: 15px; width: 100%; text-align: center; color: #666; font-weight: 600; pointer-events: none; }
    </style>
</head>
<body>

<audio id="sndHover" src="hover.mp3"></audio>
<audio id="sndClick" src="click.mp3"></audio>

<div id="titlePage" class="view" style="display: flex; align-items: center; justify-content: center;">
    <h1 style="font-size: 4rem; color: var(--p);">Wynn's Studio Pro</h1>
    <div style="display: flex; gap: 40px;">
        <div onclick="showLobby('elem')" style="cursor:pointer; background:white; padding:30px; border-radius:20px; border:4px solid var(--p);">
            <i data-lucide="baby" size="48"></i><h2>Elementary</h2>
        </div>
        <div onclick="showLobby('junior')" style="cursor:pointer; background:white; padding:30px; border-radius:20px; border:4px solid var(--p);">
            <i data-lucide="graduation-cap" size="48"></i><h2>Junior High</h2>
        </div>
    </div>
</div>

<div id="lobby" class="view">
    <h1 style="text-align: center; color: var(--p); margin-top: 40px;">Select Grade</h1>
    <div id="gradeContainer" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px;"></div>
</div>

<div id="main" class="view">
    <div style="padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;">
        <button onclick="goBack('lobby')" style="background:none; border:none;"><i data-lucide="arrow-left-circle" size="40" color="#6c5ce7"></i></button>
        <span id="gLabel" style="font-size:1.8rem; font-weight:700; color:var(--p);"></span>
        <select id="classSel" class="input-f" style="width:auto;"></select>
    </div>
    <div class="grid" id="seatGrid"></div>
</div>

<div class="footer">Teacher Wynn | Studio Pro 2026</div>

<div id="configModal">
    <div class="modal-c">
        <h2 style="color:var(--p); font-size:2rem;">Classroom Setup</h2>
        <input type="text" id="driveLink" class="input-f" placeholder="Google Drive Folder Link">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin: 15px 0;">
            <input type="number" id="classCount" class="input-f" value="6">
            <input type="file" id="namesFile" class="input-f" accept=".xlsx">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px; text-align:left;">
            <div><b>Words</b><input type="file" id="fWords" class="input-f"><input type="number" id="nWords" class="input-f" placeholder="Qty"></div>
            <div><b>Sentences</b><input type="file" id="fSents" class="input-f"><input type="number" id="nSents" class="input-f" placeholder="Qty"></div>
            <div><b>Phonics</b><input type="file" id="fPhonics" class="input-f"><input type="number" id="nPhonics" class="input-f" placeholder="Qty"></div>
        </div>
        <div style="text-align:left; margin-top:15px;">
            <label style="font-size:1.2rem;"><input type="checkbox" id="randomizeCheck" checked> Randomize material order?</label>
        </div>
        <button class="confirm-btn" onclick="confirmConfig()">Confirm & Start</button>
    </div>
</div>

<div id="modal">
    <div class="record-box">
        <h2 id="sLabel" class="comic-text">Student Name</h2>
        <div id="wordBox" class="comic-text">Ready?</div>
        
        <div id="startArea">
            <button class="confirm-btn" style="background:var(--s);" onclick="startRec()">Start Recording</button>
        </div>

        <div id="recControls" style="display:none;">
            <div style="display:flex; gap:15px;">
                <button class="confirm-btn" style="background:var(--p); flex:2;" onclick="nextWord()">Next Item</button>
                <button class="confirm-btn" style="background:var(--e); flex:1;" onclick="stopRec()">Stop & Save</button>
            </div>
            <div id="status" style="margin-top:20px; font-weight:700; color:var(--p); font-size:1.5rem;">🔴 Recording...</div>
        </div>
    </div>
</div>

<script>
    const webAppURL = 'https://script.google.com/macros/s/AKfycbxrbRAld1TM7yb_isIbYm5l4ggXtyVhudXhtA3IIdkACYJOH9CUz4vLmaPWB3mAbfyi4A/exec';
    let activeG, recorder, chunks = [], curSeat, curEl, stream, playlist = [], currentIdx = 0;
    let namesData = {}, materials = { words: [], sents: [], phonics: [] };

    lucide.createIcons();

    function showLobby(type) {
        document.getElementById('titlePage').style.display = 'none';
        document.getElementById('lobby').style.display = 'grid';
        const container = document.getElementById('gradeContainer'); container.innerHTML = '';
        const grades = type === 'elem' ? [1,2,3,4,5,6] : [7,8,9];
        grades.forEach(g => {
            const div = document.createElement('div'); div.className = 'seat'; div.innerHTML = `<h2>Grade ${g}</h2>`;
            div.onclick = () => { activeG = g; document.getElementById('configModal').style.display = 'flex'; };
            container.appendChild(div);
        });
    }

    async function parse(f) { 
        if(!f) return [];
        return new Promise(r => {
            const reader = new FileReader();
            reader.onload = e => {
                const b = XLSX.read(e.target.result, {type:'binary'});
                r(XLSX.utils.sheet_to_json(b.Sheets[b.SheetNames[0]], {header:1}).flat().filter(x => x));
            }; reader.readAsBinaryString(f);
        });
    }

    async function confirmConfig() {
        const nf = document.getElementById('namesFile').files[0]; if(nf) namesData[activeG] = await parse(nf);
        materials.words = await parse(document.getElementById('fWords').files[0]);
        materials.sents = await parse(document.getElementById('fSents').files[0]);
        materials.phonics = await parse(document.getElementById('fPhonics').files[0]);
        document.getElementById('configModal').style.display = 'none';
        launch(activeG);
    }

    function launch(g) {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        document.getElementById('gLabel').innerText = "Grade " + g;
        const grid = document.getElementById('seatGrid'); grid.innerHTML = '';
        const students = namesData[g] || Array.from({length:30}, (_,i) => "Student " + (i+1));
        students.forEach((name, i) => {
            const s = document.createElement('div'); s.className = 'seat';
            s.innerHTML = `<b>${i+1}</b><small class="comic-text">${name}</small>`;
            s.onclick = () => openRecorder(i+1, name, s);
            grid.appendChild(s);
        });
    }

    function openRecorder(num, name, el) {
        curSeat = num; curEl = el;
        document.getElementById('sLabel').innerText = name;
        const isRand = document.getElementById('randomizeCheck').checked;
        
        // Combine and respect quantity
        const pick = (arr, n) => {
            let res = [...arr]; if(isRand) res.sort(() => .5 - Math.random());
            return n ? res.slice(0, n) : res;
        };

        playlist = [
            ...pick(materials.words, document.getElementById('nWords').value),
            ...pick(materials.sents, document.getElementById('nSents').value),
            ...pick(materials.phonics, document.getElementById('nPhonics').value)
        ];

        currentIdx = 0;
        document.getElementById('wordBox').innerText = playlist[0] || "Ready?";
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('startArea').style.display = 'block';
        document.getElementById('recControls').style.display = 'none';
    }

    function nextWord() {
        currentIdx++;
        if(currentIdx < playlist.length) document.getElementById('wordBox').innerText = playlist[currentIdx];
        else document.getElementById('wordBox').innerText = "All Finished!";
    }

    async function startRec() {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream); chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = upload; recorder.start();
        document.getElementById('startArea').style.display = 'none';
        document.getElementById('recControls').style.display = 'block';
    }

    function stopRec() { 
        recorder.stop(); stream.getTracks().forEach(t => t.stop()); 
        document.getElementById('status').innerText = "⏳ Saving...";
    }

    function upload() {
        const reader = new FileReader(); reader.readAsDataURL(new Blob(chunks, {type:'audio/webm'}));
        reader.onloadend = () => {
            const folder = (document.getElementById('driveLink').value.match(/[-\w]{25,}/) || [""])[0];
            const payload = `audio=${encodeURIComponent(reader.result.split(',')[1])}&filename=${encodeURIComponent('Seat'+curSeat+'_'+document.getElementById('sLabel').innerText+'.webm')}&folderId=${folder}&className=${document.getElementById('classSel').value}`;
            fetch(webAppURL, { method: 'POST', body: payload, headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, mode: 'no-cors' })
            .then(() => { 
                curEl.classList.add('done'); 
                document.getElementById('modal').style.display = 'none'; 
            });
        };
    }

    function goBack(id) { document.querySelectorAll('.view').forEach(v => v.style.display='none'); document.getElementById(id).style.display='flex'; }
</script>
</body>
</html>
