<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wynn's Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --p: #6c5ce7; --bg: #f0f3f9; --s: #00b894; --e: #ff7675; --glass: rgba(255, 255, 255, 0.9);
        }
        
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: #a29bfe; 
            margin: 0; overflow: hidden; color: #2d3436;
        }

        .app { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }

        .view { 
            width: 96%; height: 92%; background: var(--glass); 
            backdrop-filter: blur(20px); border-radius: 40px; 
            display: none; flex-direction: column; position: relative;
            box-shadow: 0 25px 80px rgba(0,0,0,0.1);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Title Page & School Selection */
        #titlePage { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .school-box {
            background: white; padding: 40px; border-radius: 30px; width: 300px;
            cursor: pointer; transition: 0.3s; border: 4px solid transparent;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin: 20px;
        }
        .school-box:hover { transform: scale(1.05); border-color: var(--p); }

        /* Lobby Grid */
        #lobby { padding: 80px 40px; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        .grade-pill { 
            background: white; border-radius: 25px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; height: 120px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .grade-pill:hover { background: var(--p); color: white; }
        .grade-pill h2 { font-size: 2rem; }

        /* General UI */
        .navbar { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px 40px; overflow-y: auto; }
        .seat { background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; cursor: pointer; }
        .seat.done { background: var(--s); color: white; }
        
        .input-f { background: #f1f2f6; padding: 12px; border-radius: 15px; border: 2px solid #dfe6e9; width: 100%; box-sizing: border-box; font-family: inherit; }
        .btn { padding: 15px; border-radius: 20px; border: none; font-weight: 700; cursor: pointer; font-size: 1.2rem; }

        #modal, #configModal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; 
        }
        .modal-c { background: white; width: 90%; max-width: 700px; padding: 40px; border-radius: 40px; max-height: 90vh; overflow-y: auto; }

        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; margin-top: 20px; }
        .watermark { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 14px; color: var(--p); opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>

<div class="app">
    <div id="titlePage" class="view" style="display: flex;">
        <h1 style="font-size: 3.5rem; color: var(--p);">Teacher Wynn's<br>English Recording Studio</h1>
        <div style="display: flex; gap: 30px;">
            <div class="school-box" onclick="showLobby('elem')">
                <i data-lucide="baby" size="48"></i>
                <h2>Elementary School</h2>
                <p>Grades 1 - 6</p>
            </div>
            <div class="school-box" onclick="showLobby('junior')">
                <i data-lucide="graduation-cap" size="48"></i>
                <h2>Junior High School</h2>
                <p>Grades 7 - 9</p>
            </div>
        </div>
    </div>

    <div id="lobby" class="view">
        <button onclick="goBack('titlePage')" style="position:absolute; top:20px; left:20px; border:none; background:none; cursor:pointer;"><i data-lucide="chevron-left" size="40"></i></button>
        <h1 id="lobbyTitle" style="grid-column: span 3; text-align: center; color: var(--p);">Select Grade</h1>
        <div id="gradeContainer" style="display: contents;"></div>
    </div>

    <div id="main" class="view">
        <div class="navbar">
            <button onclick="goBack('lobby')" style="border:none; background:none; cursor:pointer; color:var(--p);"><i data-lucide="arrow-left-circle" size="40"></i></button>
            <div style="display:flex; gap:15px; align-items:center;">
                <span id="gLabel" style="font-size:1.5rem; font-weight:700;"></span>
                <select id="classSel" class="input-f" style="width:auto;"></select>
            </div>
            <button onclick="promptConfig(activeG)" style="border:none; background:none; cursor:pointer; color:var(--p);"><i data-lucide="settings" size="32"></i></button>
        </div>
        <div class="grid" id="seatGrid"></div>
    </div>

    <div class="watermark">Designed by Teacher Bridgette Wynn | Taichung City</div>
</div>

<div id="configModal">
    <div class="modal-c">
        <h2 style="color:var(--p);">Grade <span id="confG"></span> Configuration</h2>
        
        <div style="text-align:left; margin-bottom:15px;">
            <label>Google Drive Folder Link</label>
            <input type="text" id="driveLink" class="input-f" placeholder="Paste link...">
        </div>

        <div class="config-grid">
            <div>
                <label>Total Classes</label>
                <input type="number" id="classCount" class="input-f" value="5">
            </div>
            <div>
                <label>Student Names (Excel)</label>
                <input type="file" id="namesFile" class="input-f" accept=".xlsx,.xls">
            </div>
        </div>

        <hr style="margin:20px 0; opacity:0.2;">

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: left;">
            <div>
                <label><b>Words</b> File</label>
                <input type="file" id="fWords" class="input-f" accept=".xlsx,.xls">
                <input type="number" id="nWords" class="input-f" placeholder="Qty" style="margin-top:5px;">
            </div>
            <div>
                <label><b>Sentences</b> File</label>
                <input type="file" id="fSents" class="input-f" accept=".xlsx,.xls">
                <input type="number" id="nSents" class="input-f" placeholder="Qty" style="margin-top:5px;">
            </div>
            <div>
                <label><b>Phonics</b> File</label>
                <input type="file" id="fPhonics" class="input-f" accept=".xlsx,.xls">
                <input type="number" id="nPhonics" class="input-f" placeholder="Qty" style="margin-top:5px;">
            </div>
        </div>

        <div style="margin-top:15px; text-align:left;">
            <label><input type="checkbox" id="randomizeCheck"> Randomize selection?</label>
        </div>

        <button class="btn" style="background:var(--s); color:white; width:100%; margin-top:20px;" onclick="confirmConfig()">Confirm & Start</button>
        <button class="btn" style="background:none; color:#999; width:100%;" onclick="closeConfig()">Cancel</button>
    </div>
</div>

<div id="modal">
    <div class="modal-c" style="text-align:center;">
        <h2 id="sLabel" style="opacity:0.3;">Seat</h2>
        <div id="wordCounter" style="color:var(--p); font-weight:600;">-</div>
        <div id="wordBox" style="font-size:3rem; min-height:150px; display:flex; align-items:center; justify-content:center; color:var(--e); font-weight:700;">ready?</div>
        
        <button id="startBtn" class="btn" style="background:var(--s); color:white; width:100%;" onclick="start()">Start Recording</button>
        
        <div id="recControls" style="display:none;">
            <button id="nextBtn" class="btn" style="background:var(--p); color:white; width:100%; margin-bottom:10px;" onclick="nextWord()">Next</button>
            <button id="stopBtn" class="btn" style="background:var(--e); color:white; width:100%;" onclick="stop()">Stop & Save</button>
        </div>

        <div id="status" style="margin-top:20px; font-weight:600; color:var(--p);">...</div>
    </div>
</div>

<script>
    const webAppURL = 'https://script.google.com/macros/s/AKfycbyIZVvh4PbcfTvkpSxiglsuLlSrF2Xfpz_hayKH6ebT2yAkkxf8ADkiOdhM3O-o04RZgA/exec';
    
    let activeG, recorder, chunks = [], curSeat, curEl, stream;
    let namesData = {}, categoryData = { words: [], sents: [], phonics: [] };
    let sessionPlaylist = [], currentWordIdx = 0;

    lucide.createIcons();

    function showLobby(type) {
        document.getElementById('titlePage').style.display = 'none';
        document.getElementById('lobby').style.display = 'grid';
        const container = document.getElementById('gradeContainer');
        container.innerHTML = '';
        const grades = type === 'elem' ? [1,2,3,4,5,6] : [7,8,9];
        document.getElementById('lobbyTitle').innerText = type === 'elem' ? "Elementary School" : "Junior High School";
        grades.forEach(g => {
            const div = document.createElement('div');
            div.className = 'grade-pill';
            div.innerHTML = `<h2>Grade ${g}</h2>`;
            div.onclick = () => promptConfig(g);
            container.appendChild(div);
        });
    }

    function goBack(targetId) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        const view = document.getElementById(targetId);
        view.style.display = (targetId === 'lobby' || targetId === 'main') ? 'grid' : 'flex';
        if(targetId === 'main') view.style.display = 'flex'; // Handle layout for main view
    }

    function promptConfig(g) {
        activeG = g;
        document.getElementById('confG').innerText = g;
        document.getElementById('configModal').style.display = 'flex';
        const savedDrive = localStorage.getItem('wynn_drive');
        if(savedDrive) document.getElementById('driveLink').value = savedDrive;
    }

    function closeConfig() { document.getElementById('configModal').style.display = 'none'; }

    async function parseFile(file) {
        if (!file) return [];
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = e.target.result;
                const workbook = XLSX.read(data, {type: 'binary'});
                const list = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header:1}).flat();
                resolve(list.filter(item => item && item.toString().trim() !== ""));
            };
            reader.readAsBinaryString(file);
        });
    }

    function pickItems(arr, count, shuffle) {
        let list = [...arr];
        if (shuffle) list.sort(() => Math.random() - 0.5);
        return count > 0 ? list.slice(0, count) : list;
    }

    async function confirmConfig() {
        const nFile = document.getElementById('namesFile').files[0];
        if (nFile) namesData[activeG] = await parseFile(nFile);
        categoryData.words = await parseFile(document.getElementById('fWords').files[0]);
        categoryData.sents = await parseFile(document.getElementById('fSents').files[0]);
        categoryData.phonics = await parseFile(document.getElementById('fPhonics').files[0]);
        localStorage.setItem('wynn_drive', document.getElementById('driveLink').value);
        launch(activeG);
        closeConfig();
    }

    function launch(g) {
        goBack('main');
        document.getElementById('gLabel').innerText = "Grade " + g;
        const count = document.getElementById('classCount').value;
        const sel = document.getElementById('classSel');
        sel.innerHTML = '';
        for(let i=1; i<=count; i++){
            let v = g + (i < 10 ? "0"+i : i);
            let o = document.createElement('option'); o.value = v; o.innerText = v;
            sel.appendChild(o);
        }
        const grid = document.getElementById('seatGrid');
        grid.innerHTML = '';
        const students = namesData[g] || Array.from({length: 30}, (_, i) => `Student ${i+1}`);
        students.forEach((name, i) => {
            let s = document.createElement('div');
            s.className = 'seat';
            s.innerHTML = `<span style="font-size:1.8rem; font-weight:700;">${i+1}</span><small>${name}</small>`;
            s.onclick = () => openModal(i+1, s, name);
            grid.appendChild(s);
        });
    }

    function openModal(n, el, name) {
        curSeat = n; curEl = el;
        document.getElementById('sLabel').innerText = name;
        const doShuffle = document.getElementById('randomizeCheck').checked;
        sessionPlaylist = [
            ...pickItems(categoryData.words, document.getElementById('nWords').value, doShuffle),
            ...pickItems(categoryData.sents, document.getElementById('nSents').value, doShuffle),
            ...pickItems(categoryData.phonics, document.getElementById('nPhonics').value, doShuffle)
        ];
        if(sessionPlaylist.length === 0) sessionPlaylist = ["No words loaded"];
        currentWordIdx = 0;
        updateWordView();
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('recControls').style.display = 'none';
        document.getElementById('status').innerText = "Ready to record";
    }

    function updateWordView() {
        document.getElementById('wordBox').innerText = sessionPlaylist[currentWordIdx];
        document.getElementById('wordCounter').innerText = `Item ${currentWordIdx + 1} of ${sessionPlaylist.length}`;
        document.getElementById('nextBtn').style.display = (currentWordIdx === sessionPlaylist.length - 1) ? 'none' : 'block';
    }

    function nextWord() {
        currentWordIdx++;
        updateWordView();
    }

    async function start() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = upload;
            recorder.start();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('recControls').style.display = 'block';
            document.getElementById('status').innerText = "Recording...";
        } catch (err) {
            alert("Microphone access denied or not available.");
        }
    }

    function stop() {
        recorder.stop();
        stream.getTracks().forEach(t => t.stop());
        document.getElementById('status').innerText = "Uploading to Drive...";
    }

    function upload() {
        const reader = new FileReader();
        const audioBlob = new Blob(chunks, { type: 'audio/webm' });
        reader.readAsDataURL(audioBlob);
        reader.onloadend = () => {
            const link = document.getElementById('driveLink').value;
            const id = (link.match(/[-\w]{25,}/) || [""])[0];
            if (!id) {
                alert("Please enter a Google Drive Link in Settings!");
                return;
            }
            const payload = {
                audio: reader.result.split(',')[1],
                filename: `Seat${curSeat}_${document.getElementById('sLabel').innerText}.webm`,
                folderId: id,
                className: document.getElementById('classSel').value
            };
            const formBody = Object.keys(payload).map(key => encodeURIComponent(key) + '=' + encodeURIComponent(payload[key])).join('&');
            
            fetch(webAppURL, {
                method: 'POST',
                body: formBody,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                mode: 'no-cors'
            }).then(() => {
                curEl.classList.add('done');
                document.getElementById('status').innerText = "Saved!";
                setTimeout(() => { document.getElementById('modal').style.display = 'none'; }, 800);
            }).catch(err => {
                alert("Upload failed. Check script permissions.");
            });
        };
    }
</script>
</body>
</html>
