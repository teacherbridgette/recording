<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wynn's Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --p: #6c5ce7; --bg: #f0f3f9; --s: #00b894; --e: #ff7675; --glass: rgba(255, 255, 255, 0.9);
        }
        
        body { 
            font-family: 'Fredoka', "Comic Sans MS", cursive; 
            background: #dfe6e9; 
            margin: 0; text-transform: none; 
            overflow: hidden; color: #2d3436;
        }

        .app { 
            width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.2)), url('bg.jpg') center/cover;
            position: relative;
        }

        .view { 
            width: 96%; height: 94%; background: var(--glass); 
            backdrop-filter: blur(20px); border-radius: 50px; 
            box-shadow: 0 25px 80px rgba(0,0,0,0.1); 
            display: none; flex-direction: column; position: relative;
            border: 2px solid rgba(255,255,255,0.5); z-index: 1;
        }

        #lobby { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 25px; padding: 120px 60px 60px 60px; box-sizing: border-box;
        }

        .grade-pill { 
            background: white; border-radius: 40px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; border: 4px solid transparent;
        }
        .grade-pill:hover { transform: translateY(-5px); border-color: var(--p); }
        .grade-pill h2 { font-size: 2.5rem; margin: 0; color: var(--p); }

        .navbar { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 0 50px 50px; overflow-y: auto; }

        .seat { 
            background: white; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 1.1rem; font-weight: 700; min-height: 120px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .seat.done { background: var(--s); color: white; }
        .seat span.s-num { font-size: 2rem; color: #b2bec3; }
        .seat.done span.s-num { color: white; }

        .input-f { background: #f8faff; padding: 12px; border-radius: 15px; border: 2px solid #edf2f7; font-family: inherit; outline: none; width: 100%; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border-radius: 30px; border: none; font-size: 1.5rem; font-weight: 700; color: white; cursor: pointer; transition: 0.2s; }
        
        #modal, #configModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-c { background: white; width: 90%; max-width: 800px; padding: 40px; border-radius: 50px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }

        #wordBox { font-size: 4rem; color: var(--e); margin: 20px 0; font-weight: 700; min-height: 150px; display: flex; align-items: center; justify-content: center; text-align: center; }
        
        .ai-rating-badge {
            background: #f0f3f9; padding: 15px; border-radius: 20px; border: 2px dashed var(--p);
            margin-top: 15px; font-weight: 700; font-size: 1.2rem; display: none;
        }

        .watermark { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: 600; color: var(--p); z-index: 100; opacity: 0.7; }
    </style>
</head>
<body>

<div class="app">
    <div id="lobby" class="view" style="display: grid;">
        <h1 style="position:absolute; top:30px; left:50%; transform:translateX(-50%); color:var(--p);">Teacher Wynn's Recording Studio</h1>
        <div class="grade-pill" onclick="promptConfig(1)"><h2>Grade 1</h2></div>
        <div class="grade-pill" onclick="promptConfig(2)"><h2>Grade 2</h2></div>
        <div class="grade-pill" onclick="promptConfig(3)"><h2>Grade 3</h2></div>
        <div class="grade-pill" onclick="promptConfig(4)"><h2>Grade 4</h2></div>
        <div class="grade-pill" onclick="promptConfig(5)"><h2>Grade 5</h2></div>
        <div class="grade-pill" onclick="promptConfig(6)"><h2>Grade 6</h2></div>
    </div>

    <div id="main" class="view">
        <div class="navbar">
            <button onclick="location.reload()" style="border:none; background:none; cursor:pointer;"><i data-lucide="arrow-left-circle" color="#6c5ce7" size="40"></i></button>
            <div style="display:flex; gap:20px; align-items:center;">
                <span id="gLabel" style="font-size:1.5rem; font-weight:700;"></span>
                <select id="classSel" class="input-f" style="width:auto;" onchange="renderClassGrid()"></select>
            </div>
            <div style="width:40px;"></div>
        </div>
        <div class="grid" id="seatGrid"></div>
    </div>

    <div class="watermark">Designed by Teacher Bridgette Wynn • Taichung City</div>
</div>

<div id="configModal">
    <div class="modal-c">
        <h2 style="text-align:center; color:var(--p);">Grade <span id="confG"></span> Setup</h2>
        
        <div style="border: 2px dashed #ddd; padding: 20px; border-radius: 25px; margin-bottom: 20px;">
            <label style="font-weight:700;">Classes</label>
            <input type="number" id="classCount" class="input-f" value="3" oninput="generateClassInputs()" style="margin: 10px 0;">
            <div id="classFilesContainer" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

        <div style="border: 2px dashed #ddd; padding: 20px; border-radius: 25px;">
            <label style="font-weight:700;">Materials</label>
            <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
                <input type="file" id="wordsFile" class="input-f" style="flex:1;">
                <select id="wordMode" class="input-f" style="width:auto;"><option value="random">Random</option><option value="seq">Sequential</option></select>
                <input type="number" id="wordQty" class="input-f" placeholder="Qty" style="width:70px;" value="1">
            </div>
            <small style="color:gray;">Upload Excel for Words/Sentences</small>
        </div>

        <button class="btn" style="background:var(--s); margin-top:20px;" onclick="confirmConfig()">Open Studio 🚀</button>
    </div>
</div>

<div id="modal">
    <div class="modal-c" style="text-align:center;">
        <h2 id="sLabel" style="opacity:0.5;">Student Name</h2>
        <div id="wordBox">Ready?</div>
        <div id="aiRating" class="ai-rating-badge"></div>
        
        <button id="startBtn" class="btn" style="background:var(--s);" onclick="startRec()">Start Recording</button>
        
        <div id="recControls" style="display:none;">
            <button id="stopBtn" class="btn" style="background:var(--e);" onclick="stopRec()">Stop & Save</button>
        </div>
        
        <button id="closeBtn" onclick="closeModal()" style="margin-top:20px; border:none; background:none; color:#b2bec3; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    let activeG, curSeat, curEl, recorder, stream, chunks = [];
    let classData = {}; // Stores names per class
    let vocabulary = []; // Combined list from Excel
    
    // AI Speech Engine
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    let lastTranscript = "";

    lucide.createIcons();

    function promptConfig(g) {
        activeG = g;
        document.getElementById('confG').innerText = g;
        document.getElementById('configModal').style.display = 'flex';
        generateClassInputs();
    }

    function generateClassInputs() {
        const container = document.getElementById('classFilesContainer');
        const count = document.getElementById('classCount').value;
        container.innerHTML = '';
        for(let i=1; i<=count; i++) {
            const cName = activeG + (i < 10 ? '0'+i : i);
            container.innerHTML += `
                <div style="background:#f8faff; padding:10px; border-radius:15px; display:flex; align-items:center; gap:10px;">
                    <span style="font-weight:700; min-width:80px;">Class ${cName}</span>
                    <input type="file" class="name-input" data-class="${cName}" style="font-size:0.8rem;">
                </div>`;
        }
    }

    async function confirmConfig() {
        // 1. Process Names
        const fileInputs = document.querySelectorAll('.name-input');
        for (let input of fileInputs) {
            if (input.files[0]) {
                const names = await parseExcel(input.files[0]);
                classData[input.getAttribute('data-class')] = names;
            }
        }

        // 2. Process Words
        const wFile = document.getElementById('wordsFile').files[0];
        if (wFile) vocabulary = await parseExcel(wFile);

        // 3. Setup UI
        const sel = document.getElementById('classSel');
        sel.innerHTML = '';
        Object.keys(classData).forEach(c => {
            sel.innerHTML += `<option value="${c}">${c}</option>`;
        });

        document.getElementById('configModal').style.display = 'none';
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        renderClassGrid();
    }

    function renderClassGrid() {
        const grid = document.getElementById('seatGrid');
        const className = document.getElementById('classSel').value;
        const names = classData[className] || [];
        grid.innerHTML = '';
        names.forEach((name, idx) => {
            const s = document.createElement('div');
            s.className = 'seat';
            s.innerHTML = `<span class="s-num">${idx+1}</span><small>${name}</small>`;
            s.onclick = () => openStudio(idx + 1, name, s);
            grid.appendChild(s);
        });
    }

    function openStudio(num, name, el) {
        curSeat = num; curEl = el;
        document.getElementById('sLabel').innerText = name;
        document.getElementById('aiRating').style.display = 'none';
        
        // Pick random word
        if(vocabulary.length > 0) {
            const qty = document.getElementById('wordQty').value || 1;
            const shuffled = [...vocabulary].sort(() => 0.5 - Math.random());
            document.getElementById('wordBox').innerText = shuffled.slice(0, qty).join(", ");
        }

        document.getElementById('modal').style.display = 'flex';
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('recControls').style.display = 'none';
    }

    async function startRec() {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        chunks = [];
        lastTranscript = "";

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.start();
        recognition.start();

        recognition.onresult = (e) => { lastTranscript = e.results[0][0].transcript; };

        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('recControls').style.display = 'block';
    }

    function stopRec() {
        recorder.stop();
        recognition.stop();
        stream.getTracks().forEach(t => t.stop());

        // AI Scoring Logic
        const target = document.getElementById('wordBox').innerText.toLowerCase();
        const score = calculateScore(target, lastTranscript.toLowerCase());
        
        const badge = document.getElementById('aiRating');
        badge.innerHTML = `AI Heard: "${lastTranscript || '...'}" <br> Score: ${score}%`;
        badge.style.display = 'block';

        curEl.classList.add('done');
        setTimeout(closeModal, 3000);
    }

    function calculateScore(target, spoken) {
        if (!spoken) return 0;
        const tArr = target.split(/[\s,]+/);
        const sArr = spoken.split(/\s+/);
        let matches = 0;
        tArr.forEach(w => { if(sArr.includes(w)) matches++; });
        return Math.round((matches / tArr.length) * 100);
    }

    function parseExcel(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => {
                const data = XLSX.read(e.target.result, {type:'binary'});
                const sheet = data.Sheets[data.SheetNames[0]];
                resolve(XLSX.utils.sheet_to_json(sheet, {header:1}).flat().filter(x => x));
            };
            reader.readAsBinaryString(file);
        });
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
